name: Publish release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate tag and package
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '\r\n' < VERSION)"
          if [[ "v${version}" != "${GITHUB_REF_NAME}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match VERSION=${version}" >&2
            exit 1
          fi
          zip -r DeviceLogCaptureTool.zip \
            DeviceLogCapture.cmd \
            DeviceLogCapture.ps1 \
            README.md \
            VERSION \
            update-config.json \
            lib \
            DeviceLogs/.gitkeep

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            DeviceLogCaptureTool.zip \
            --title "DeviceLogCaptureTool ${GITHUB_REF_NAME}" \
            --generate-notes
