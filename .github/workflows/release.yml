name: Publish release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  validate-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Use supported Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Validate PowerShell and Node.js sources
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Filter *.ps1 | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName,
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors) {
              $errors | ForEach-Object { Write-Error "$($_.Extent.File):$($_.Extent.StartLineNumber): $($_.Message)" }
              throw "PowerShell parser validation failed for $($_.FullName)"
            }
          }
          node --check lib/cdp-capture.js
          & ./tests/Sensitive-Data-Smoke.ps1 -IncludeHistory
          & ./tests/Static-Smoke.ps1
          & ./tests/Sdk-Smoke.ps1
          & ./tests/Updater-Smoke.ps1
          node --test tests/recorder-smoke.test.js

  release:
    needs: validate-windows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate tag and package
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '\r\n' < VERSION)"
          if [[ "v${version}" != "${GITHUB_REF_NAME}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match VERSION=${version}" >&2
            exit 1
          fi
          zip -r DeviceLogCaptureTool.zip \
            DeviceLogCapture.cmd \
            DeviceLogCapture.ps1 \
            README.md \
            VERSION \
            update-config.json \
            lib \
            DeviceLogs/.gitkeep
          rm -rf package-check
          mkdir package-check
          unzip -q DeviceLogCaptureTool.zip -d package-check
          test "$(tr -d '\r\n' < package-check/VERSION)" = "${version}"
          test -f package-check/lib/device-profiles.json
          if find package-check -type f \( -name '*.har' -o -name '*.log' \) | grep -q .; then
            echo "The release package contains user capture files" >&2
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            DeviceLogCaptureTool.zip \
            --title "DeviceLogCaptureTool ${GITHUB_REF_NAME}" \
            --generate-notes
